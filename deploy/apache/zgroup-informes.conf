# VirtualHost Apache2 para ZGROUP Informes Técnicos
# Instalar: sudo cp deploy/apache/zgroup-informes.conf /etc/apache2/sites-available/
#           sudo a2ensite zgroup-informes.conf && sudo systemctl reload apache2
#
# Ajuste PROJECT_ROOT si mueve el proyecto.

Define PROJECT_ROOT /home/telemetriazgroup/Proyectos/test_informes

<VirtualHost *:80>
    ServerName zgroup-informes.local
    ServerAlias localhost
    DocumentRoot ${PROJECT_ROOT}

    Alias /assets ${PROJECT_ROOT}/public/assets
    <Directory ${PROJECT_ROOT}/public/assets>
        Options -Indexes
        Require all granted
    </Directory>

    <Directory ${PROJECT_ROOT}>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory ${PROJECT_ROOT}/informes>
        Options -Indexes
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/zgroup-informes-error.log
    CustomLog ${APACHE_LOG_DIR}/zgroup-informes-access.log combined
</VirtualHost>
